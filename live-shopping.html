<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>直播带货 · 助农销售 - 启跃文化传媒</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <meta name="description" content="启跃文化传媒直播带货服务，深入农村，将赤峰优质农产品推向全国。">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-banner {
            text-align: center;
            padding: 60px 0 40px;
        }
        .page-banner h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 15px;
        }
        .page-banner p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .feature-card {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,20,60,0.3);
            border-color: #ffffff;
        }
        .feature-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }
        .feature-card .card-label {
            padding: 15px 18px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
        }
        .back-link-container {
            text-align: center;
            padding: 20px 0 40px;
        }
        .back-link {
            color: #ffffff;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 导航栏（与首页一致） -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="img/logo.png" alt="启跃文化传媒 Logo" onerror="this.style.display='none'">
                <span>启跃文化传媒</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">首页</a>
                <a href="index.html#about">公司简介</a>
                <a href="index.html#services">核心业务</a>
                <a href="index.html#cases">助农案例</a>
                <a href="index.html#gallery">公司实景</a>
                <a href="news-list.html">新闻资讯</a>
                <a href="index.html#contact" class="btn-contact">联系我们</a>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <div class="container page-banner">
        <span class="section-tag">核心业务</span>
        <h1>直播带货 · 助农销售</h1>
        <p>深入农村基层，与农户和合作社紧密合作，通过精心策划的直播活动，将赤峰优质农产品推向全国市场。</p>
    </div>

    <!-- 图片展示区（七张图，按需替换路径） -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="feature-grid">
                <!-- 图1 -->
                <div class="feature-card">
                    <img src="img/live/01.png" alt="直播选品" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=直播选品'">
                    <div class="card-label">精选助农产品</div>
                </div>
                <!-- 图2 -->
                <div class="feature-card">
                    <img src="img/live/02.jpg" alt="直播现场" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=直播现场'">
                    <div class="card-label">专业直播现场</div>
                </div>
                <!-- 图3 -->
                <div class="feature-card">
                    <img src="img/live/03.jpg" alt="产品展示" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=产品展示'">
                    <div class="card-label">产地溯源展示</div>
                </div>
                <!-- 图4 -->
                <div class="feature-card">
                    <img src="img/live/04.jpg" alt="打包发货" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=打包发货'">
                    <div class="card-label">高效打包发货</div>
                </div>
                <!-- 图5 -->
                <div class="feature-card">
                    <img src="img/live/05.jpg" alt="农户合作" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=农户合作'">
                    <div class="card-label">农户紧密合作</div>
                </div>
                <!-- 图6 -->
                <div class="feature-card">
                    <img src="img/live/06.jpg" alt="团队培训" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=团队培训'">
                    <div class="card-label">直播技能培训</div>
                </div>
                <!-- 图7 -->
                <div class="feature-card">
                    <img src="img/live/07.png" alt="数据复盘" class="clickable-image" onerror="this.src='https://placehold.co/600x400/1e293b/ffffff?text=数据复盘'">
                    <div class="card-label">数据复盘优化</div>
                </div>
            </div>

            <div class="back-link-container">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="img/logo.png" alt="启跃文化传媒" onerror="this.style.display='none'">
                    <span>启跃文化传媒</span>
                </div>
                <p>科技赋能，引领数字传媒新风尚</p>
                <p class="copyright">© 2022-2026 赤峰市启跃文化传媒有限公司 | 法人：梁敏 | 保留所有权利</p>
            </div>
        </div>
    </footer>

    <!-- 图片预览模态框 -->
    <div id="imageModal" class="image-modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage" alt="预览图片">
    </div>

    <script src="js/script.js"></script>
</body>
</html>
